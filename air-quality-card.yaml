type: custom:air-quality-card
title: Living Room

sensors:
  - entity: sensor.awair_element_temperature
    label: Temp
    unit: "°C"
    thresholds: [17, 20, 25, 28]
  - entity: sensor.awair_element_humidity
    label: Humidity
    unit: "%"
    thresholds: [30, 40, 60, 70]
  - entity: sensor.awair_element_co2
    label: "CO₂"
    unit: ppm
    thresholds: [700, 1000, 1500, 2000]
  - entity: sensor.awair_element_voc
    label: Chemicals
    unit: ppb
    thresholds: [300, 500, 700, 1000]
  - entity: sensor.awair_element_pm25
    label: PM2.5
    unit: "µg/m³"
    thresholds: [5, 12, 35, 55]
